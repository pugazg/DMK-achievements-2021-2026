<!doctype html>
<!-- Language strategy: the interface is written in English; Tamil appears only
     as scheme proper nouns inside records. So the document language stays "en"
     and Tamil runs are tagged lang="ta" at the element level (RecordCard,
     ShareCard). Setting lang="ta" on <html> would make a screen reader apply
     Tamil pronunciation to the entire English interface — worse than no tag.
     Revisit if the UI itself is ever translated. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="An evidence explorer of Tamil Nadu government records, 2021–2026: achievement records, manifesto commitments, Government Orders and legislative documents, each linked to its published source. Government-reported; not independently audited." />
    <meta name="theme-color" content="#0a0807" />
    <meta property="og:title" content="The Dravidian Model · Tamil Nadu 2021–2026" />
    <meta property="og:description" content="An evidence explorer of Tamil Nadu government records, achievements, manifesto commitments and legislative documents — sourced line by line, with an evidence grade on every record." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Dravidian Model · Tamil Nadu 2021–2026" />
    <!-- Twitter falls back to og:* when these are absent, but naming them keeps
         the shared preview from being assembled out of page text. -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Dravidian Model · Tamil Nadu 2021–2026" />
    <meta name="twitter:description" content="An evidence explorer of Tamil Nadu government records, achievements, manifesto commitments and legislative documents — sourced line by line, with an evidence grade on every record." />

  </head>

</html>
